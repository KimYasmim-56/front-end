<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Site Legal 02</title>
  </head>
  <body>
    <header>
      <h1>Loja de Produtos</h1>
      <p>Escolha seu produto favorito e preencha seu nome para comprar</p>
    </header>

    <main>
      <section class="produtos">
        <!-- card 01 -->
        <div class="card">
          <h2>Fone de Ouvido</h2>
          <p class="descricao">fone confortável com ótima qualidade</p>
          <input type="text" placeholder="Digite seu nome" />
          <button>Comprar</button>
        </div>
        <!-- card 02 -->
        <div class="card">
          <h2>Mouse Gamer</h2>
          <p class="descricao">mouse com design moderno e iluminação rgb</p>
          <input type="text" placeholder="Digite seu nome" />
          <button>Comprar</button>
        </div>
        <!-- card 03 -->
        <div class="card">
          <h2>Teclado Mecânico</h2>
          <p class="descricao">teclado resistente, confortável e ideal para games</p>
          <input type="text" placeholder="Digite seu nome" />
          <button>Comprar</button>
        </div>
      </section>
    </main>
  </body>
</html>

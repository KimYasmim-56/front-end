<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <h1>site legal!!!</h1>
    <!-- checkbox -->
     <input type="checkbox" id="checked" checked>
     <label for="checked">checkbox</label>
<br>
<br>
   <!-- radio -->
     <input type="radio" id="mele" name="gender">
     <label for="male">masculino </label>
 
     <input type="radio" id="female" name="gender">
     <label for="female">Feminino</label>
 
     <input type="radio" id="Other" name="gender">
     <label for="Other">Outros</label>
<br>
<br>
    <!-- select com options -->
     <select>
     <option value="volvo">volvo</option>
     <option  value="BMW">BMW</option>
     <option  value="Mercedes">mercedes</option>
     <option  value="audi">Audi</option>
     </select>
<br><br>
 
   <!-- input desabilitados -->
     <input type="text" disabled>
     <br><br>
     <!-- input obrigatório -->
     <input type="email" required>
     <br><br>

     <!-- Placeholder -->

     <input
     type="text"
     placeholder="Digite o seu nome"
     >
    <br><br>

    <!-- Paragrafo -->
<p class="meu-paragrafo">
aaaaaaaaaaaaaaaaa aaaaa aaaa aaaa.
</p>

  <!-- Lista não ordenada -->
    <ul>
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ul>
    <ul>
        <li class="itens">Item 1</li>
        <li class="itens">Item 2</li>
        <li class="itens">Item 3</li>
    </ul>
</body>
</html>
